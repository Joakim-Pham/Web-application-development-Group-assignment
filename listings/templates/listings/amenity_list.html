{% extends "listings/base.html" %}
 
{% block title %}Amenities{% endblock %}
 
{% block content %}
<h1>Amenities</h1>
 
{% for amenity in amenities %}
    <span class="chip">✓ {{ amenity.name }}</span>
{% empty %}
    <p>No amenities found.</p>
{% endfor %}
 
<br><br>
<a href="{% url 'home' %}" class="back-link">← Back to home</a>
{% endblock %}
