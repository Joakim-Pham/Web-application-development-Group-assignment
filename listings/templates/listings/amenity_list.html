{% extends "listings/base.html" %}

{% block title %}Amenities{% endblock %}

{% block content %}
<h1>Amenities</h1>

<ul>
    {% for amenity in amenities %}
        <li>{{ amenity.name }}</li>
    {% empty %}
        <li>No amenities found.</li>
    {% endfor %}
</ul>

<a href="{% url 'home' %}">Back to home</a>
{% endblock %}
