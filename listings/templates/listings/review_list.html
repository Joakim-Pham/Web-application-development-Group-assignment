{% extends "listings/base.html" %}

{% block title %}Reviews{% endblock %}

{% block content %}
<h1>Reviews</h1>

<ul>
    {% for review in reviews %}
        <li>{{ review.rating }} - {{ review.comment }}</li>
    {% empty %}
        <li>No reviews found.</li>
    {% endfor %}
</ul>

<a href="{% url 'home' %}">Back to home</a>
{% endblock %}
