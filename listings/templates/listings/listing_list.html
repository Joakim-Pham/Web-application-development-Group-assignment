<!DOCTYPE html>
<html>
<head>
    <title>Listings</title>
</head>
<body>
    <h1>Listings</h1>

    <a href="{% url 'listing_create' %}">Create New Listing</a>

    <ul>
        {% for listing in listings %}
            <li>
                <a href="{% url 'listing_detail' listing.id %}">
                    {{ listing.title }}
                </a>
                - {{ listing.city }}, {{ listing.country }}
                - {{ listing.price_per_night }}

                <a href="{% url 'listing_update' listing.id %}">Edit</a>
                <a href="{% url 'listing_delete' listing.id %}">Delete</a>
            </li>
        {% empty %}
            <li>No listings available.</li>
        {% endfor %}
    </ul>

    <a href="{% url 'home' %}">Back to home</a>
</body>
</html>
