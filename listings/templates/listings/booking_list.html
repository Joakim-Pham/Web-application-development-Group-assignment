<!DOCTYPE html>
<html>
<head>
    <title>Bookings</title>
</head>
<body>
    <h1>Bookings</h1>

    <ul>
        {% for booking in bookings %}
            <li>
                {{ booking.guest.username }} booked {{ booking.listing.title }}
            </li>
        {% empty %}
            <li>No bookings found.</li>
        {% endfor %}
    </ul>

    <a href="{% url 'home' %}">Back to home</a>
</body>
</html>
