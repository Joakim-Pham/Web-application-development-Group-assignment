{% extends "listings/base.html" %}

{% block title %}Bookings{% endblock %}

{% block content %}
<h1>Bookings</h1>

<ul>
    {% for booking in bookings %}
        <li>{{ booking.guest.username }} booked {{ booking.listing.title }}</li>
    {% empty %}
        <li>No bookings found.</li>
    {% endfor %}
</ul>

<a href="{% url 'home' %}">Back to home</a>
{% endblock %}
