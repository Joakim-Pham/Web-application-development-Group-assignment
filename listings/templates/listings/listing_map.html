{% extends "listings/base.html" %}

{% block title %}Map{% endblock %}

{% block content %}
<h1>Listing Map</h1>

<div id="map" style="height: 600px; border-radius: 16px; overflow: hidden;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var bounds = [];

    {% for listing in listings %}
        var lat = {{ listing.latitude }};
        var lng = {{ listing.longitude }};

        var marker = L.marker([lat, lng]).addTo(map);

        marker.bindPopup(
            "<strong>{{ listing.title|escapejs }}</strong><br>" +
            "{{ listing.city|escapejs }}, {{ listing.country|escapejs }}<br><br>" +
            "€{{ listing.price_per_night }} / night<br><br>" +
            "<a href='/listings/{{ listing.id }}/' " +
            "style='display:inline-block; background:#ff7a00; color:white; padding:6px 14px; " +
            "border-radius:8px; text-decoration:none; font-weight:600; font-size:13px;'>" +
            "View &amp; Book →</a>"
        );

        bounds.push([lat, lng]);
    {% endfor %}

    if (bounds.length > 0) {
        map.fitBounds(bounds);
    }
</script>

{% endblock %}
